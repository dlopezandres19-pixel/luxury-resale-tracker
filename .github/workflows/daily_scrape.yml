name: Daily Luxury Scrape

on:
  schedule:
    - cron: "50 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Run Foxytotes scraper
        run: python scraper/foxytotes_scraper.py

      - name: Run Watchcharts scraper
        run: python scraper/watchcharts_scraper.py
        continue-on-error: true
    
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/handbags_history.json data/watches_history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily handbag data update $(date -u +%Y-%m-%d)"
            git push
          fi
